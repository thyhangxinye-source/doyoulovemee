<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi cậu ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ffb6c1,#ffe4e1);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.card{
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    width:90%;
    max-width:600px;
    box-shadow:0 15px 30px rgba(0,0,0,0.15);
    z-index:10;
}

h1{
    color:#ff4f81;
    margin-bottom:15px;
}

p{
    color:#666;
    margin-bottom:25px;
    line-height:1.6;
}

button{
    border:none;
    border-radius:50px;
    padding:14px 28px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}

#yes{
    background:#ff4f81;
    color:white;
}

#yes:hover{
    transform:scale(1.1);
}

#no{
    background:#eee;
}

.heart{
    position:absolute;
    color:#ff4f81;
    pointer-events:none;
    animation:floatUp linear forwards;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}

.bigHeart{
    position:absolute;
    font-size:60px;
    animation:explode 1.5s forwards;
}

@keyframes explode{
    from{
        opacity:1;
        transform:scale(0.2);
    }
    to{
        opacity:0;
        transform:scale(2.5);
    }
}
</style>
</head>

<body>

<div class="card" id="card">
    <h1>🌷 Tớ có điều muốn hỏi cậu 🌷</h1>

    <p>
        Tớ đã suy nghĩ rất lâu rồi...
        Và hôm nay quyết định lấy hết can đảm để nói ra.
    </p>

    <h2 style="color:#ff4f81;">
        Cậu làm người yêu tớ nhé? ❤️
    </h2>

    <br>

    <button id="yes">Đồng ý 💕</button>
    <button id="no">Không 😝</button>
</div>

<script>

const noBtn = document.getElementById("no");

const messages = [
    "Ơ kìa 😳",
    "Suy nghĩ lại đi 🥺",
    "Bấm nhầm đúng không? 😆",
    "Tớ không tin đâu 😭",
    "Nút này bị lỗi rồi 🤭",
    "Không được từ chối đâu 😝",
    "Cho tớ cơ hội nha ❤️"
];

noBtn.addEventListener("mouseover", () => {

    const maxX = window.innerWidth - 120;
    const maxY = window.innerHeight - 70;

    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random()*maxX + "px";
    noBtn.style.top = Math.random()*maxY + "px";

    noBtn.innerText =
        messages[Math.floor(Math.random()*messages.length)];
});

document.getElementById("yes").onclick = () => {

    document.getElementById("card").innerHTML = `
        <h1>🥰 Yayyyyy 🥰</h1>
        <p style="font-size:22px">
            Từ hôm nay, tớ xin được chính thức thích cậu
            một cách công khai rồi nha ❤️
        </p>
        <h2 style="color:#ff4f81">
            Cảm ơn vì đã đồng ý 🌷
        </h2>
    `;

    for(let i=0;i<80;i++){

        const heart=document.createElement("div");

        heart.className="bigHeart";
        heart.innerHTML="❤️";

        heart.style.left=Math.random()*100+"vw";
        heart.style.top=Math.random()*100+"vh";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },1500);
    }
};

function createHeart(){

    const heart=document.createElement("div");

    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(15+Math.random()*30)+"px";

    const duration=4+Math.random()*4;

    heart.style.animationDuration=
        duration+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },duration*1000);
}

setInterval(createHeart,150);

</script>

</body>
</html>
